spring.config.import=optional:file:.env[.properties]

spring.application.name=NexoraFinance

server.port=${PORT:8080}


#Production Database Connection

spring.datasource.url=${PROD_DB_URL}
spring.datasource.username=${PROD_DB_USERNAME}
spring.datasource.password=${PROD_DB_PASSWORD}

#JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false


#JWT Configuration
#jwt.secret.string=${JWT_SECRET}
#jwt.expiration.time=${JWT_EXPIRATION_TIME}

jwt.secret.string=${JWT_SECRET}
jwt.expiration.time=${JWT_EXPIRATION_TIME}

#Mail Configuration

spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.host=smtp.gmail.com
spring.mail.port=587

#Enable TLS SMTP MAIL

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true


password.reset.link=http://localhost:63342/reset-password?code=


#AWS S3 CONFIG
aws.accessKeyId=${AWS_ACCESS_KEY}
aws.secretAccessKey=${AWS_SECRETE_KEY}
aws.region=eu-north-1
aws.s3.bucketName=${AWS_BUCKET_NAME}

logging.level.org.springframework.core.env=DEBUG